    <!-- Multilingual signalling. The marketing pages currently render in

         and the Profile lang switch will re-enable them. The hreflang

    <link rel="alternate" hreflang="fr" href="https://ora-studio.app/" />
    <link rel="alternate" hreflang="x-default" href="https://ora-studio.app/" />

    <!-- PWA manifest + installable icon set -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts — Bagel Fat One for display headlines, JetBrains Mono for

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta property="og:locale:alternate" content="fr_FR" />
