version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      react:
        patterns:
          - react
          - react-dom
          - react-router
      tooling:
        patterns:
          - vite
          - "@vitejs/*"
          - tailwindcss
          - "@tailwindcss/*"
    ignore:
      # FFmpeg + Remotion are tightly version-pinned to the surrounding
      # video pipeline. Update by hand once per quarter so we can re-test
      # the editor instead of letting Dependabot ship a major bump.
      - dependency-name: "@ffmpeg/*"
      - dependency-name: "remotion"
      - dependency-name: "@remotion/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
