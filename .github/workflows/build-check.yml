name: Build Check

# Run on every PR and on every push to main. Catches build-breaking
# changes (TypeScript errors, missing imports, broken bundle config)
# BEFORE they reach prod. Lightweight — just `npm ci` + `vite build`,
# no test framework yet (we don't have one). Adds ~60-90s per PR but
# eliminates the "I broke main" class of bugs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Vite build
        run: npm run build
        env:
          # Build doesn't talk to Supabase, but vite runs envless without
          # complaining since we use process.env at runtime not buildtime.
          NODE_ENV: production

      - name: Bundle size check
        # Hard ceiling on the main index chunk. The "weapon of war" sprint
        # got it to ~520KB; if we cross 700KB without thinking, fail the
        # build. Keeps us honest on dependency creep.
        run: |
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js | head -1)
          MAX_SIZE=$((700 * 1024))
          if [ "$MAIN_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Main bundle is ${MAIN_SIZE} bytes (max ${MAX_SIZE}). Add chunks to vite.config.ts manualChunks."
            exit 1
          fi
          echo "Main bundle: $((MAIN_SIZE / 1024)) KB (limit: $((MAX_SIZE / 1024)) KB)"
