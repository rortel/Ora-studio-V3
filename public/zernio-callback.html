<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORA - Connect</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#1a1918;color:#E8E4DF;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.container{width:100%;max-width:420px;text-align:center}
.logo{margin-bottom:24px;font-size:22px;font-weight:700;letter-spacing:2px;color:#C8A97E}
.card{background:#2a2928;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:32px 28px;text-align:center}
.success-icon{font-size:48px;color:#5E6AD2;margin-bottom:12px}
h2{font-size:18px;font-weight:500;margin:0 0 8px}
p{font-size:14px;color:#7A7572;margin:0}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#C8A97E;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:#E5534B;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">ORA</div>
  <div class="card" id="loadingCard">
    <div class="spinner"></div>
    <h2>Connecting...</h2>
    <p>Please wait</p>
    <div class="error-msg" id="errorMsg" style="display:none"></div>
  </div>
  <div class="card" id="successCard" style="display:none">
    <div class="success-icon">&#10003;</div>
    <h2>Account Connected</h2>
    <p>You can close this window.</p>
  </div>
</div>

<script>
(function() {
  var SERVER = "https://kbvkjafkztbsewtaijuh.supabase.co/functions/v1/make-server-cad57f79";
  var params = new URLSearchParams(window.location.search);
  var platform = params.get("platform") || params.get("connected") || "unknown";
  var step = params.get("step") || "";
  var tempToken = params.get("tempToken") || "";
  var profileId = params.get("profileId") || "";
  var userProfileRaw = params.get("userProfile") || "{}";
  var userProfile;
  try { userProfile = JSON.parse(userProfileRaw); } catch(e) { userProfile = {}; }

  function showSuccess() {
    document.getElementById("loadingCard").style.display = "none";
    document.getElementById("successCard").style.display = "block";
    try { window.opener.postMessage({ type: "zernio-oauth-complete", platform: platform, status: "success" }, "*"); } catch(e) {}
    setTimeout(function() { window.close(); }, 2000);
  }

  function showError(msg) {
    var el = document.getElementById("errorMsg");
    el.textContent = msg || "Connection failed. Please try again.";
    el.style.display = "block";
    document.querySelector(".spinner").style.display = "none";
    document.querySelector("#loadingCard h2").textContent = "Connection failed";
    setTimeout(function() { window.close(); }, 5000);
  }

  // No selection needed — already connected (Instagram, Twitter, etc.)
  if (!step) {
    showSuccess();
    return;
  }

  // LinkedIn: auto-select "personal" profile
  if (step === "select_organization" && platform === "linkedin") {
    fetch(SERVER + "/zernio/linkedin/select-organization", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ profileId: profileId, tempToken: tempToken, userProfile: userProfile, accountType: "personal" })
    }).then(function(res) {
      return res.json().then(function(d) { return { ok: res.ok, data: d }; });
    }).then(function(r) {
      if (!r.ok) throw new Error(r.data.error || "Connection failed");
      showSuccess();
    }).catch(function(e) { showError(e.message); });
    return;
  }

  // Facebook: auto-select first page
  if (step === "select_page" && platform === "facebook") {
    var pagesRaw = params.get("pages") || "[]";
    var pages;
    try { pages = JSON.parse(pagesRaw); } catch(e) { pages = []; }
    if (!Array.isArray(pages) || pages.length === 0) {
      showError("No Facebook pages found. Make sure you have admin access to at least one page.");
      return;
    }
    var page = pages[0];
    fetch(SERVER + "/zernio/facebook/select-page", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ profileId: profileId, pageId: page.id, tempToken: tempToken, userProfile: userProfile })
    }).then(function(res) {
      return res.json().then(function(d) { return { ok: res.ok, data: d }; });
    }).then(function(r) {
      if (!r.ok) throw new Error(r.data.error || "Connection failed");
      showSuccess();
    }).catch(function(e) { showError(e.message); });
    return;
  }

  // Unknown step — show success
  showSuccess();
})();
</script>
</body>
</html>
